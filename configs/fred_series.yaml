# Phase 1 FRED series.
# Read by src/metals/data/fred.py.

series:
  # TIPS (real) yields. No DFII2 — shortest TIPS issuance is 5y.
  - { id: "DFII10", name: tips_10y, freq: daily }
  - { id: "DFII5",  name: tips_5y,  freq: daily }

  # Nominal Treasury yields
  - { id: "DGS10",  name: treasury_10y, freq: daily }
  - { id: "DGS2",   name: treasury_2y,  freq: daily }
  - { id: "DGS3MO", name: treasury_3mo, freq: daily }

  # USD index (broad)
  - { id: "DTWEXBGS", name: usd_broad_index, freq: daily }

  # Equity volatility
  - { id: "VIXCLS", name: vix_close, freq: daily }

  # Gold implied volatility (Cboe GVZ) — the one forward-looking vol input to
  # the spread-floor tail term. No exchange-published vol index exists for
  # silver/PGM, so those metals fall back to classical downside realized vol.
  - { id: "GVZCLS", name: gold_vol_index, freq: daily }

  # Inflation expectations (breakevens)
  - { id: "T10YIE", name: breakeven_10y, freq: daily }
  - { id: "T5YIE",  name: breakeven_5y,  freq: daily }

  # Credit spread proxy. BAA10Y replaces BAMLH0A0HYM2 because ICE Data
  # Indices imposed a 3-year license window on FRED publication of the
  # ICE BofA HY OAS in April 2026, leaving only ~2023-05-15 onward via
  # the free FRED API. BAA10Y (Moody's Baa - 10Y Treasury) is daily,
  # FRBSTL-published, freely available, and goes back to 1986.
  - { id: "BAA10Y", name: baa_spread, freq: daily }

  # Fed balance sheet (weekly)
  - { id: "WALCL", name: fed_balance_sheet, freq: weekly }

# Default date range; the API caps at the series' own start date if earlier.
date_range:
  start: "2007-01-01"
  end: null
