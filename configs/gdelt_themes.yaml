# Phase 3 step 3.2: GKG theme filter set, verified against the GDELT 2.0
# theme vocabulary at:
#   http://data.gdeltproject.org/api/v2/guides/LOOKUP-GKGTHEMES.TXT
#
# We filter GDELT 2.0 GKG records to articles tagged with at least one of
# these themes. Theme codes are case-sensitive and matched against the
# semicolon-separated V2Themes field. The naming conventions are:
#
#   ECON_*  - GDELT's own economics taxonomy
#   EPU_*   - Economic Policy Uncertainty index categories
#   WB_*    - World Bank development taxonomy
#   ENV_*   - Environmental themes
#
# Themes intentionally NOT included despite being mentioned in the plan:
#   * KILL, MILITARY, PROTEST - over 50% / 23% / 20% of all daily articles
#     respectively. Dominate the corpus with low metals relevance.
#   * GEOPOLITICAL, WB_2462_GEOPOLITICAL_INSTABILITY - either don't exist in
#     the current GDELT vocab or have non-standard codes.
#   * SILVER/COPPER/PLATINUM/PALLADIUM-specific themes - GDELT has no
#     per-metal price code other than ECON_GOLDPRICE. The other metals are
#     captured via WB_1699_METAL_ORE_MINING + body content.

themes:
  # Monetary policy
  - ECON_CENTRALBANK
  - WB_1235_CENTRAL_BANKS
  - EPU_POLICY_MONETARY_POLICY
  - WB_444_MONETARY_POLICY

  # Interest rates and inflation
  - ECON_INTEREST_RATES
  - EPU_POLICY_INTEREST_RATES
  - WB_1125_INTEREST_RATE_POLICY
  - ECON_INFLATION
  - WB_442_INFLATION

  # Commodities and metals
  - ECON_GOLDPRICE
  - WB_1164_COMMODITY_PRICES_SHOCKS
  - WB_1699_METAL_ORE_MINING

  # Trade and sanctions
  - SANCTIONS
  - ECON_TRADE_DISPUTE
